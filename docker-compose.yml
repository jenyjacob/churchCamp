version: "3.9"

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: churchcamp
      MYSQL_USER: campuser
      MYSQL_PASSWORD: camppass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "campuser", "-pcamppass"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: mysql+pymysql://campuser:camppass@db:3307/churchcamp
      JWT_SECRET_KEY: dev-secret-change-in-prod
      SECRET_KEY: flask-dev-secret
      CORS_ORIGINS: http://localhost:3000,http://localhost:80
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: python app.py

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
